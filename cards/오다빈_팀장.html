<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>오다빈 - JB.E 기업지원센터</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      padding: 20px;
    }

    .card {
      background: #fff;
      width: 100%;
      max-width: 520px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.13);
    }

    .card-header {
      background: #fff;
      padding: 32px 28px 20px;
      border-bottom: 4px solid #1a3a6b;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .company-name {
      font-size: 1.5rem;
      font-weight: 800;
      color: #1a3a6b;
      letter-spacing: -0.5px;
    }

    .company-name span { color: #e8a020; }

    .divider-line {
      width: 100%;
      height: 2px;
      background: #1a3a6b;
      margin: 6px 0;
    }

    .company-sub {
      font-size: 0.85rem;
      color: #444;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .logo-img {
      width: 60px;
      height: 60px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .card-person {
      padding: 20px 28px;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      border-bottom: 1px solid #eee;
      background: #fafbfd;
    }

    .person-info { text-align: right; }

    .department {
      font-size: 0.82rem;
      color: #666;
      margin-bottom: 4px;
    }

    .person-name {
      font-size: 1.8rem;
      font-weight: 800;
      color: #1a3a6b;
      letter-spacing: 6px;
    }

    .card-contacts {
      padding: 20px 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border-bottom: 1px solid #eee;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      border-radius: 8px;
      padding: 8px 10px;
      transition: background 0.15s;
      text-decoration: none;
    }

    .contact-item:hover { background: #f0f4f8; }

    .contact-icon {
      width: 32px;
      height: 32px;
      background: #1a3a6b;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-icon svg {
      width: 16px;
      height: 16px;
      fill: #fff;
    }

    .contact-text {
      font-size: 1rem;
      color: #1a3a6b;
      font-weight: 600;
    }

    .contact-address .contact-icon { background: #e8a020; }

    .contact-address .contact-text {
      color: #444;
      font-weight: 400;
      font-size: 0.92rem;
    }

    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a3a6b;
      color: #fff;
      padding: 10px 24px;
      border-radius: 24px;
      font-size: 0.88rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.show { display: flex; }

    .modal {
      background: #fff;
      width: 100%;
      max-width: 520px;
      border-radius: 20px 20px 0 0;
      padding: 28px 24px 36px;
      animation: slideUp 0.25s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .modal-title {
      font-size: 1rem;
      color: #999;
      text-align: center;
      margin-bottom: 20px;
    }

    .modal-number {
      font-size: 1.5rem;
      font-weight: 800;
      color: #1a3a6b;
      text-align: center;
      margin-bottom: 24px;
    }

    .modal-btns { display: flex; gap: 12px; }

    .modal-btn {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .modal-btn:hover { opacity: 0.85; }
    .btn-call   { background: #1a3a6b; color: #fff; }
    .btn-copy   { background: #f0f4f8; color: #1a3a6b; }
    .btn-cancel { background: #eee; color: #666; }

    .card-banner {
      background: #1a3a6b;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .banner-icon { font-size: 1.5rem; }

    .banner-text {
      color: #e8a020;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="header-left">
      <div class="company-name">
        <span>JB.E</span> 기업지원센터
      </div>
      <div class="divider-line"></div>
      <div class="company-sub">기업 정책자금 전문 컨설팅</div>
    </div>
    <svg width="60" height="60" viewBox="0 0 60 60">
        <rect width="60" height="60" rx="8" fill="#f0f4f8"/>
        <rect x="10" y="35" width="8" height="15" rx="2" fill="#1a3a6b"/>
        <rect x="22" y="25" width="8" height="25" rx="2" fill="#1a3a6b"/>
        <rect x="34" y="15" width="8" height="35" rx="2" fill="#1a3a6b"/>
        <polygon points="42,8 55,8 55,21" fill="#e8a020"/>
        <line x1="38" y1="12" x2="55" y2="8" stroke="#e8a020" stroke-width="2.5"/>
       </svg>
  </div>

  <div class="card-person">
    <div class="person-info">
      <div class="department">경영관리부 / 팀장</div>
      <div class="person-name">오 다 빈</div>
    </div>
  </div>

  <div class="card-contacts">
    <div class="contact-item" onclick="openPhoneModal('010-4719-0634')">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
      </div>
      <div class="contact-text">010-4719-0634</div>
    </div>

    <div class="contact-item" onclick="copyToClipboard('jb260330@naver.com', '이메일')">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
      </div>
      <div class="contact-text">jb260330@naver.com</div>
    </div>

    <div class="contact-item contact-address">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      </div>
      <div class="contact-text">대전 서구 둔산동 1015 6층</div>
    </div>
  </div>

  <div class="card-banner">
    <span class="banner-icon">👉</span>
    <span class="banner-text">무료 정책자금 가능 여부 진단</span>
  </div>
</div>

<!-- 전화 모달 -->
<div class="modal-overlay" id="phoneModal">
  <div class="modal">
    <div class="modal-title">전화 연결 또는 번호 복사</div>
    <div class="modal-number" id="modalNumber"></div>
    <div class="modal-btns">
      <button class="modal-btn btn-call"   id="btnCall">📞 전화걸기</button>
      <button class="modal-btn btn-copy"   id="btnCopyPhone">📋 번호복사</button>
      <button class="modal-btn btn-cancel" onclick="closeModal()">취소</button>
    </div>
  </div>
</div>

<!-- 복사 토스트 -->
<div class="toast" id="toast"></div>

<script>
function openPhoneModal(phone) {
  document.getElementById('modalNumber').textContent = phone;
  document.getElementById('btnCall').onclick      = () => { window.location.href = 'tel:' + phone; closeModal(); };
  document.getElementById('btnCopyPhone').onclick = () => { copyToClipboard(phone, '전화번호'); closeModal(); };
  document.getElementById('phoneModal').classList.add('show');
}

function closeModal() {
  document.getElementById('phoneModal').classList.remove('show');
}

document.getElementById('phoneModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function copyToClipboard(text, label) {
  navigator.clipboard.writeText(text).then(() => {
    showToast(label + '이 복사되었습니다!');
  }).catch(() => {
    const el = document.createElement('textarea');
    el.value = text;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast(label + '이 복사되었습니다!');
  });
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}
</script>
</body>
</html>
